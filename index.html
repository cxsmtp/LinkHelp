<script type="text/babel">
const {useState,useEffect,useRef} = React;

const APP_URL = "https://cxsmtp.github.io/LinkHelp/";
const TABS = ["Home","Topics","Contacts","Schedule","Events"];
const STRENGTHS = ["Strong","Warm","Cold"];
const INDUSTRIES = ["Tech","Cybersecurity","Sales","Fintech","Healthcare","SaaS","Other"];
const STATUSES = ["Draft","Scheduled","Published"];

const FEED_SOURCES = [
  {name:"Checkmarx",   url:"https://checkmarx.com/feed/",                    tag:"AppSec"},
  {name:"Hacker News", url:"https://feeds.feedburner.com/TheHackersNews",    tag:"CVE/News"},
  {name:"Krebs",       url:"https://krebsonsecurity.com/feed/",              tag:"Breaches"},

const sampleContacts = [
  {id:1,name:"Priya Sharma",role:"CISO",company:"CloudShield",industry:"Cybersecurity",strength:"Strong",followUp:"2026-03-18",birthday:"1988-07-15",workAnniversary:"2020-03-01",notes:"Met at Black Hat 2025",tags:["AppSec","CISO"]},
  {id:2,name:"Marcus Lee",role:"AppSec Lead",company:"Palo Alto Networks",industry:"Cybersecurity",strength:"Warm",followUp:"2026-03-22",birthday:"1990-03-20",workAnniversary:"2022-06-10",notes:"Interested in AI threat modeling",tags:["AppSec","AI"]},
  {id:3,name:"Ananya Iyer",role:"Head of Security Engineering",company:"FinEdge",industry:"Fintech",strength:"Strong",followUp:"2026-03-25",birthday:"1985-12-05",workAnniversary:"2019-03-12",notes:"Zero trust architecture",tags:["AppSec","ZeroTrust"]},

const samplePosts = [
  {id:1,title:"The Hidden Cost of Insecure Code in the Age of AI",body:"Draft...",status:"Published",date:"2026-03-05",source:"Checkmarx"},
  {id:2,title:"Why Zero Trust Fails Without Application-Layer Thinking",body:"Draft...",status:"Scheduled",date:"2026-03-14",source:"PortSwigger"},

function store(k,v){try{if(v!==undefined)localStorage.setItem(k,JSON.stringify(v));else{const x=localStorage.getItem(k);return x?JSON.parse(x):null;}}catch(e){return null;}}
function getDaysUntil(mmdd){
  const t0=new Date();t0.setHours(0,0,0,0);
  const [m,d]=mmdd.split("-").map(Number);
  let n=new Date(t0.getFullYear(),m-1,d);
  if(n<t0)n.setFullYear(t0.getFullYear()+1);
  return Math.round((n-t0)/86400000);
}
function getCelebrations(contacts){
  const ev=[];
  contacts.forEach(c=>{
    if(c.birthday){const d=getDaysUntil(c.birthday.slice(5));if(d<=30)ev.push({...c,type:"Birthday",emoji:"🎂",days:d});}
    if(c.workAnniversary){const d=getDaysUntil(c.workAnniversary.slice(5));if(d<=30)ev.push({...c,type:"Work Anniversary",emoji:"🏆",days:d});}
  });
  return ev.sort((a,b)=>a.days-b.days);
}

// RSS fetch via JSONP — bypasses CORS on mobile Chrome
function fetchViaJsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="rss_"+Math.random().toString(36).slice(2);
    const script=document.createElement("script");
    const timer=setTimeout(()=>{cleanup();reject(new Error("timeout"));},9000);
    function cleanup(){clearTimeout(timer);delete window[cb];if(script.parentNode)script.remove();}
    window[cb]=data=>{cleanup();resolve(data);};
    script.src=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=4&callback=${cb}`;
    script.onerror=()=>{cleanup();reject(new Error("script error"));};
    document.head.appendChild(script);
  });
}

function parseItems(items,src){
  return (items||[]).slice(0,3).map(i=>({
    title:(i.title||"").trim(),
    link:i.link||i.url||"",
    summary:(i.description||i.content||"").replace(/<[^>]*>/g,"").replace(/\s+/g," ").trim().slice(0,350),
    date:i.pubDate||i.published||"",
    source:src.name,
    tag:src.tag,
  })).filter(i=>i.title);
}

async function fetchAllTopics(){
  const results = await Promise.allSettled(
    FEED_SOURCES.map(async src=>{
      try{
        const d = await fetchViaJsonp(src.url);
        if(d.status==="ok"&&d.items&&d.items.length) return parseItems(d.items,src);
      }catch(e){}
      // fallback: allorigins
      try{
        const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(src.url)}`,{signal:AbortSignal.timeout(8000)});
        const d=await r.json();
        const xml=d.contents||"";
        const matches=xml.match(/<item>([\s\S]*?)<\/item>/g)||[];
        if(matches.length){
          return matches.slice(0,3).map(raw=>{
            const get=tag=>{
              const m=raw.match(new RegExp("<"+tag+"[^>]*><!\\[CDATA\\[([\\s\\S]*?)\\]\\]></"+tag+">|<"+tag+"[^>]*>([\\s\\S]*?)</"+tag+">"));
              return m?(m[1]||m[2]||"").trim():"";
            };
            return{title:get("title"),link:get("link")||get("guid"),summary:get("description").replace(/<[^>]*>/g,"").slice(0,350),date:get("pubDate"),source:src.name,tag:src.tag};
          }).filter(i=>i.title);
        }
      }catch(e){}
      return [];
    })
  );
  const all=results.flatMap(r=>r.status==="fulfilled"?r.value:[]).filter(a=>a.title);
  if(!all.length)throw new Error("No topics fetched");
  return all.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function buildPrompt(articles){
  const today=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
  const block=articles.map((a,i)=>`SOURCE ${i+1} [${a.source} / ${a.tag}]
Title: ${a.title}
Summary: ${a.summary}
URL: ${a.link}
Date: ${a.date?new Date(a.date).toLocaleDateString("en-GB"):"Recent"}`).join("\n\n---\n\n");

  return `Today: ${today}

AUTHOR VOICE:
- Strategic CISO perspective: connects AppSec risk to business and board-level decisions
- Educator: makes complex security accessible to both executives and engineers
- First-person, practitioner tone: measured, direct, no hype, no marketing language
- Uses "I", "we", "in my experience"
- No emojis. No exclamation marks. No bullet points inside the post.

SOURCE MATERIAL:
${block}

---
PRODUCE EXACTLY THE FOLLOWING — use these headers:

## LINKEDIN POST
- Line 1: One short, bold statement that challenges conventional thinking. Not a question.
- 4 paragraphs, max 3 sentences each, no bullet points
- Para 1: What is happening in AppSec right now — use sources above AND search for relevant CVEs, breaches, announcements from the past 14 days
- Para 2: Why this matters at board and business level — translate technical risk to financial or reputational exposure
- Para 3: What most security teams are getting wrong or missing
- Para 4: One practical honest recommendation a practitioner can act on today
- Final line: exactly these 3 hashtags: #ApplicationSecurity #CyberSecurity #AppSec
- No emojis. No bold. No bullets. No sub-headers. 250-320 words total.

## THOUGHT LEADERSHIP QUOTE
- 2 sentences max, practitioner voice, not a vendor tagline
- Format: "Quote." — AppSec and Security Leader

## IMAGE GENERATION PROMPT
- Detailed DALL-E prompt for a 1200x628 LinkedIn image
- Dark cinematic style, no text, no faces, no logos
- Describe scene, lighting, colour palette, mood specifically

## POST TITLE
- 10 words max, headline style, for your own filing

---
IMPORTANT: If source articles are older than 2 weeks, treat as background only. Lead with what is current. Search for the latest AppSec, CVE, breach, or regulatory news from the past 14 days to enrich the post.`;
}

function Badge({text,color="slate"}){
  const c={slate:"bg-slate-100 text-slate-600",blue:"bg-blue-100 text-blue-700",green:"bg-green-100 text-green-700",yellow:"bg-yellow-100 text-yellow-800",red:"bg-red-100 text-red-700",purple:"bg-purple-100 text-purple-700",gray:"bg-gray-100 text-gray-600",orange:"bg-orange-100 text-orange-700",pink:"bg-pink-100 text-pink-700",indigo:"bg-indigo-100 text-indigo-700",teal:"bg-teal-100 text-teal-700",cyan:"bg-cyan-100 text-cyan-700"};
  return <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${c[color]||c.slate}`}>{text}</span>;
}
function statusColor(s){return s==="Published"?"green":s==="Scheduled"?"blue":"gray";}
function sourceColor(s){const m={Checkmarx:"indigo",PortSwigger:"cyan","Dark Reading":"red",Krebs:"purple","Hacker News":"teal","SANS ISC":"orange"};return m[s]||"slate";}

// ── Bixby Guide ───────────────────────────────────────────────

          <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-3"/>
          <div className="flex justify-between items-center">

            <button onClick={onClose} className="text-gray-400 text-2xl w-8 h-8">x</button>
          </div>
        </div>

            {n:1,t:"Open Bixby Routines",b:"Settings → Advanced Features → Bixby Routines"},
            {n:2,t:"Create a new routine",b:"Tap the + button. Name it: LinkedIn Blog Automation"},
            {n:3,t:"Set the IF trigger",b:"Tap IF → Time → 9:00 AM → Repeat: Tuesday and Friday → Done"},
            {n:4,t:"Set the THEN action",b:"Tap THEN → Add action → Apps → Open app → Chrome. In the URL field paste the trigger URL below. Tap Done."},
            {n:5,t:"Add notification (optional)",b:"Tap + → Send notification. Title: Blog post day. Body: Fetching latest AppSec topics now."},

// ── Topics Tab ────────────────────────────────────────────────
function Topics({posts,setPosts}){
  const [status,setStatus]=useState("idle");
  const [articles,setArticles]=useState([]);
  const [selected,setSelected]=useState([]);
  const [prompt,setPrompt]=useState("");
  const [showPrompt,setShowPrompt]=useState(false);
  const [btnState,setBtnState]=useState("idle");
  const [filterTag,setFilterTag]=useState("All");

  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    if(p.get("action")==="autoblog")doFetch();
  },[]);

  useEffect(()=>{
    if(selected.length>0)setPrompt(buildPrompt(selected));
  },[selected]);

  async function doFetch(){
    setStatus("fetching");setArticles([]);setSelected([]);setPrompt("");
    try{const items=await fetchAllTopics();setArticles(items);setStatus("ready");}
    catch(e){setStatus("error");}
  }

  function toggleSelect(a){
    setSelected(prev=>{
      const exists=prev.find(x=>x.link===a.link&&x.title===a.title);
      if(exists)return prev.filter(x=>!(x.link===a.link&&x.title===a.title));
      if(prev.length>=3)return prev;
      return [...prev,a];
    });
  }

  async function handleSend(){
    if(!prompt)return;
    setBtnState("sending");
    try{
      if(navigator.share){
        await navigator.share({title:"LinkedIn Post Prompt",text:prompt});
        setBtnState("sent");
      }else{
        await navigator.clipboard.writeText(prompt);
        setBtnState("copied");
        setTimeout(()=>window.open("https://chat.openai.com/","_blank"),500);
      }
    }catch(e){
      await navigator.clipboard&&navigator.clipboard.writeText(prompt).catch(()=>{});
      setBtnState("copied");
      setTimeout(()=>window.open("https://chat.openai.com/","_blank"),500);
    }
    setTimeout(()=>setBtnState("idle"),3000);
  }

  function saveDraft(){
    if(!selected.length)return;
    const post={id:Date.now(),title:selected[0].title.slice(0,80),body:prompt,status:"Draft",date:new Date().toISOString().split("T")[0],source:selected[0].source};
    const u=[...posts,post];setPosts(u);store("posts",u);
    alert("Saved as draft.");
  }

  const allTags=["All",...new Set(articles.map(a=>a.tag))];
  const filtered=filterTag==="All"?articles:articles.filter(a=>a.tag===filterTag);
  const manualTopics=[
    {title:"AI-generated code is creating a new class of vulnerabilities that SAST tools were not built to detect",tag:"AppSec"},
    {title:"API-first architectures are outpacing security team readiness at every layer",tag:"AppSec"},
    {title:"Why shift-left is failing and what shift-everywhere actually means in practice",tag:"AppSec"},
    {title:"Software supply chain attacks have doubled — and most organisations still lack a complete SBOM",tag:"Supply Chain"},
    {title:"LLM prompt injection is the SQL injection of 2025 — and we are repeating the same mistakes",tag:"AI Security"},
    {title:"The real reason patch management keeps failing is not tooling — it is ownership",tag:"AppSec"},
  ];

  return(
    <div className="space-y-4 pb-6">
      <div className="bg-slate-900 rounded-xl p-5 text-white">
        <div className="font-bold text-lg tracking-tight">AppSec Thought Leadership</div>
        <div className="text-xs text-slate-400 mt-1">Pulls live topics from 6 security sources. Select 1 to 3 then send to ChatGPT.</div>
        <div className="flex flex-wrap gap-1.5 mt-3">
          {FEED_SOURCES.map(s=><Badge key={s.name} text={s.name} color={sourceColor(s.name)}/>)}
        </div>
      </div>

      <div className="bg-white border border-gray-200 rounded-xl p-4">
        <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">One ChatGPT response gives you:</div>
        {[
          {n:"1",t:"LinkedIn Post",pts:["250-320 words, 4 paragraphs, clean prose","No emojis, no bullet points, professional tone","Grounded in your topics + last 14 days of AppSec news"]},
          {n:"2",t:"Thought Leadership Quote",pts:["2 sentences, practitioner voice","Ready for carousel or LinkedIn story","Attribution included"]},
          {n:"3",t:"Image Generation Prompt",pts:["Detailed DALL-E prompt in same response","Paste into ChatGPT image tab to generate","Dark cinematic LinkedIn-ready visual"]},
        ].map(item=>(
          <div key={item.n} className="mb-3 border border-gray-100 rounded-xl p-3">
            <div className="text-sm font-bold text-gray-800 mb-1.5">{item.n}. {item.t}</div>
            {item.pts.map((p,i)=>(
              <div key={i} className="flex items-start gap-2 mb-1">
                <div className="w-1 h-1 bg-gray-400 rounded-full mt-1.5 shrink-0"/>
                <div className="text-xs text-gray-500">{p}</div>
              </div>
            ))}
          </div>
        ))}
      </div>

      {status==="idle"&&(
        <button onClick={doFetch} className="w-full bg-slate-800 text-white py-4 rounded-xl font-semibold text-sm active:bg-slate-700">
          Fetch Latest Security Topics
        </button>
      )}

      {status==="fetching"&&(
        <div className="bg-white border rounded-xl p-10 text-center">
          <div className="text-2xl spin mb-3">◌</div>
          <div className="font-semibold text-gray-700 text-sm">Fetching from 6 security sources...</div>
          <div className="text-xs text-gray-400 mt-1">Checkmarx · PortSwigger · Dark Reading · Krebs · Hacker News · SANS</div>
        </div>
      )}

      {status==="error"&&(
        <div className="bg-red-50 border border-red-200 rounded-xl p-5 text-center">
          <div className="font-semibold text-red-700 text-sm">Could not fetch live topics</div>
          <div className="text-xs text-red-400 mt-1 mb-4">Showing curated AppSec topics below. You can still select and send to ChatGPT.</div>
          <div className="flex gap-2 justify-center">
            <button onClick={doFetch} className="bg-red-600 text-white px-6 py-2 rounded-xl text-sm font-medium">Retry Live</button>
            <button onClick={()=>{setArticles(CURATED_TOPICS);setStatus("ready");}} className="bg-slate-800 text-white px-6 py-2 rounded-xl text-sm font-medium">Use Curated Topics</button>
          </div>
        </div>
      )}

      {status==="ready"&&(
        <div className="fade space-y-4">
          <div className="flex justify-between items-center">
            <div className="text-sm font-semibold text-gray-700">{articles.length} topics found</div>
            <div className="flex gap-2 items-center">
              {selected.length>0&&<span className="text-xs text-blue-600 font-semibold">{selected.length} selected (max 3)</span>}
              <button onClick={()=>{setStatus("idle");setArticles([]);setSelected([]);}} className="text-xs text-gray-400 border px-2 py-1 rounded-lg">Refresh</button>
            </div>
          </div>
          <div className="flex gap-2 overflow-x-auto pb-1">
            {allTags.map(t=><button key={t} onClick={()=>setFilterTag(t)} className={`px-3 py-1 rounded-full text-xs font-medium whitespace-nowrap ${filterTag===t?"bg-slate-800 text-white":"bg-white border text-gray-600"}`}>{t}</button>)}
          </div>
          <div className="space-y-2">
            {filtered.map((a,i)=>{
              const isSel=selected.find(x=>x.title===a.title);
              const maxed=selected.length>=3&&!isSel;
              return(
                <button key={i} onClick={()=>!maxed&&toggleSelect(a)}
                  className={`w-full text-left border rounded-xl p-4 transition ${isSel?"border-slate-800 bg-slate-50":maxed?"opacity-40 bg-white":"bg-white border-gray-200"}`}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1">
                      <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                        <Badge text={a.source} color={sourceColor(a.source)}/>
                        {a.date&&<span className="text-xs text-gray-400">{new Date(a.date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span>}
                      </div>
                      <div className="font-semibold text-sm text-gray-800 leading-snug">{a.title}</div>
                      {a.summary&&<div className="text-xs text-gray-500 mt-1 line-clamp-2">{a.summary}</div>}
                    </div>
                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 mt-0.5 ${isSel?"bg-slate-800 border-slate-800 text-white":"border-gray-300"}`}>
                      {isSel&&<span className="text-xs font-bold">{selected.findIndex(x=>x.title===a.title)+1}</span>}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {selected.length>0&&(
        <div className="space-y-3">
          <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
            <button onClick={()=>setShowPrompt(p=>!p)} className="w-full flex justify-between items-center px-4 py-3">
              <span className="text-sm font-semibold text-gray-700">Preview ChatGPT Prompt</span>
              <span className="text-xs text-gray-400">{showPrompt?"hide":"show"}</span>
            </button>
            {showPrompt&&(
              <div className="px-4 pb-4">
                <textarea className="w-full border rounded-xl p-3 text-xs h-48 resize-none bg-gray-50 text-gray-600 leading-relaxed" value={prompt} onChange={e=>setPrompt(e.target.value)}/>
                <div className="text-xs text-gray-400 mt-1">You can edit this before sending</div>
              </div>
            )}
          </div>

          <button onClick={handleSend}
            className={`w-full py-4 rounded-xl font-bold text-sm transition ${btnState==="sent"?"bg-green-600 text-white":btnState==="copied"?"bg-amber-600 text-white":"bg-slate-800 text-white active:bg-slate-700"}`}>
            {btnState==="sent"?"Sent to ChatGPT via Share Sheet":btnState==="copied"?"Prompt copied — ChatGPT opening":"Send to ChatGPT"}
          </button>

          <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 text-xs text-slate-600 space-y-1.5 leading-relaxed">
            <div className="font-semibold text-slate-800">How this works on Samsung</div>
            <div>Tapping Send uses Android Share Sheet — select ChatGPT from the list of apps that appears. The full prompt goes directly into it.</div>
            <div>If ChatGPT does not appear in the share list, open the ChatGPT app once manually, then come back and try again.</div>
            <div className="font-semibold text-slate-700 mt-2">Inside ChatGPT:</div>
            <div>1. Paste or accept the prompt and hit Send</div>
            <div>2. Copy the LinkedIn Post section to LinkedIn</div>
            <div>3. Tap the image icon in ChatGPT and paste the Image Generation Prompt to create your visual</div>
            <div>4. Use the quote as your first comment or a carousel slide</div>
          </div>

          <div className="flex gap-2">
            <button onClick={saveDraft} className="flex-1 border border-slate-300 text-slate-700 py-2.5 rounded-xl text-sm font-medium">Save Draft</button>
            <button onClick={()=>setSelected([])} className="flex-1 border text-gray-400 py-2.5 rounded-xl text-sm">Clear</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Home ──────────────────────────────────────────────────────
function Home({contacts,posts,setTab,showBixby}){
  const cel=getCelebrations(contacts);
  const todayCel=cel.filter(e=>e.days===0);
  const week7=cel.filter(e=>e.days>0&&e.days<=7);
  const strong=contacts.filter(c=>c.strength==="Strong").length;
  return(
    <div className="space-y-4 pb-6">
      {todayCel.length>0&&(
        <div className="bg-rose-600 rounded-xl p-4 text-white">
          <div className="font-bold">Celebrations today</div>
          {todayCel.map((e,i)=><div key={i} className="text-sm mt-1">{e.emoji} {e.type} — {e.name}</div>)}
        </div>

// ── Contacts ──────────────────────────────────────────────────
function Contacts({contacts,setContacts}){
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [activeStr,setActiveStr]=useState("All");
  const [importing,setImporting]=useState(false);
  const fileRef=useRef();

  const filtered=contacts.filter(c=>
    (activeStr==="All"||c.strength===activeStr)&&
    (c.name.toLowerCase().includes(search.toLowerCase())||(c.company||"").toLowerCase().includes(search.toLowerCase()))
  );
  const grouped={Strong:filtered.filter(c=>c.strength==="Strong"),Warm:filtered.filter(c=>c.strength==="Warm"),Cold:filtered.filter(c=>c.strength==="Cold")};

  function openAdd(){setForm({name:"",role:"",company:"",industry:"Tech",strength:"Warm",followUp:"",birthday:"",workAnniversary:"",notes:"",tags:""});setModal("add");}
  function openEdit(c){setForm({...c,tags:(c.tags||[]).join(", ")});setModal("edit");}
  function saveContact(){
    const contact={...form,tags:form.tags?form.tags.split(",").map(t=>t.trim()).filter(Boolean):[]};
    const u=modal==="add"?[...contacts,{...contact,id:Date.now()}]:contacts.map(c=>c.id===form.id?contact:c);
    setContacts(u);store("contacts",u);setModal(null);
  }
  function del(id){const u=contacts.filter(c=>c.id!==id);setContacts(u);store("contacts",u);}

  function handleCSV(e){
    const file=e.target.files[0];if(!file)return;
    setImporting(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const lines=ev.target.result.split("\n").filter(l=>l.trim());
        if(lines.length<2){alert("CSV appears empty.");setImporting(false);return;}
        const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim().toLowerCase());
        const idx=k=>headers.findIndex(h=>h.includes(k));
        const fI=idx("first"),lI=idx("last"),coI=idx("company"),roI=Math.max(idx("position"),idx("title"),idx("role"));
        const imported=[];
        for(let i=1;i<lines.length;i++){
          const cols=lines[i].match(/(".*?"|[^,\n]+)/g)||[];
          const c=cols.map(x=>x.replace(/^"|"$/g,"").trim());
          const name=`${fI>=0?c[fI]||"":""} ${lI>=0?c[lI]||"":""}`.trim();
          if(!name)continue;
          if(contacts.find(x=>x.name.toLowerCase()===name.toLowerCase()))continue;
          imported.push({id:Date.now()+i,name,role:roI>=0?c[roI]||"":"",company:coI>=0?c[coI]||"":"",industry:"Tech",strength:"Warm",followUp:"",birthday:"",workAnniversary:"",notes:"Imported from LinkedIn",tags:["LinkedIn"]});
        }
        if(!imported.length){alert("No new contacts found.");setImporting(false);return;}
        const u=[...contacts,...imported];setContacts(u);store("contacts",u);
        alert(`Imported ${imported.length} contacts.`);
      }catch{alert("Could not read CSV file.");}
      setImporting(false);fileRef.current.value="";
    };
    reader.readAsText(file);
  }

  return(
    <div className="space-y-4 pb-6">
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
        <div className="font-semibold text-blue-800 text-sm mb-1">Import from LinkedIn</div>
        <div className="text-xs text-blue-600 mb-3">LinkedIn app: Settings — Data Privacy — Get a copy of your data — Connections — Request Archive. Download CSV from your email and import here.</div>
        <input ref={fileRef} type="file" accept=".csv" className="hidden" onChange={handleCSV}/>
        <button onClick={()=>fileRef.current.click()} disabled={importing} className="w-full bg-blue-700 text-white py-2.5 rounded-xl text-sm font-semibold disabled:opacity-50">
          {importing?"Importing...":"Import Connections.csv"}
        </button>
      </div>
      <div className="flex gap-2">
        <input className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm flex-1 bg-white" placeholder="Search contacts..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <button onClick={openAdd} className="bg-slate-800 text-white px-4 py-2 rounded-xl text-sm font-medium">Add</button>
      </div>
      <div className="flex gap-2 overflow-x-auto pb-1">
        {["All",...STRENGTHS].map(s=>(
          <button key={s} onClick={()=>setActiveStr(s)} className={`px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap ${activeStr===s?"bg-slate-800 text-white":"bg-white border border-gray-200 text-gray-600"}`}>
            {s}{s!=="All"?` (${contacts.filter(c=>c.strength===s).length})`:""}
          </button>
        ))}
      </div>
      <div className="text-xs text-gray-400">{contacts.length} total contacts</div>
      {(activeStr==="All"?STRENGTHS:[activeStr]).map(str=>grouped[str]&&grouped[str].length>0&&(
        <div key={str}>
          <div className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">{str} ({grouped[str].length})</div>
          <div className="space-y-2">
            {grouped[str].map(c=>{
              const cel=[];
              if(c.birthday){const d=getDaysUntil(c.birthday.slice(5));if(d<=30)cel.push(`Birthday in ${d}d`);}
              if(c.workAnniversary){const d=getDaysUntil(c.workAnniversary.slice(5));if(d<=30)cel.push(`Anniversary in ${d}d`);}
              return(
                <div key={c.id} className={`bg-white border rounded-xl p-4 ${cel.length?"border-rose-200":""}`}>
                  <div className="flex justify-between items-start">
                    <div><div className="font-semibold text-gray-800">{c.name}</div><div className="text-xs text-gray-400 mt-0.5">{c.role}{c.role&&c.company?" · ":""}{c.company}</div></div>
                    <Badge text={c.industry} color="slate"/>
                  </div>
                  {cel.map((x,i)=><div key={i} className="text-xs text-rose-500 font-medium mt-1">{x}</div>)}
                  {c.notes&&<div className="text-xs text-gray-400 mt-1.5 italic">{c.notes}</div>}
                  {c.tags&&c.tags.length>0&&<div className="flex flex-wrap gap-1 mt-2">{c.tags.map(t=><Badge key={t} text={t} color="gray"/>)}</div>}
                  <div className="flex justify-between items-center mt-3">
                    {c.followUp&&<span className="text-xs text-amber-600">Follow-up: {c.followUp}</span>}
                    <div className="ml-auto flex gap-4">
                      <button onClick={()=>openEdit(c)} className="text-xs text-blue-600">Edit</button>
                      <button onClick={()=>del(c.id)} className="text-xs text-red-400">Remove</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
      {modal&&(
        <div className="fixed inset-0 bg-black/50 flex items-end z-50" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="bg-white rounded-t-2xl p-5 w-full max-h-[90vh] overflow-y-auto">
            <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"/>
            <div className="font-bold text-lg mb-4">{modal==="add"?"Add Contact":"Edit Contact"}</div>
            <div className="space-y-3">
              {[["name","Full Name"],["role","Role / Title"],["company","Company"],["notes","Notes"]].map(([k,l])=>(
                <div key={k}><label className="text-xs text-gray-500 font-medium">{l}</label><input className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form[k]||""} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/></div>
              ))}
              <div className="grid grid-cols-2 gap-3">
                <div><label className="text-xs text-gray-500 font-medium">Industry</label><select className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.industry||"Tech"} onChange={e=>setForm(p=>({...p,industry:e.target.value}))}>{INDUSTRIES.map(i=><option key={i}>{i}</option>)}</select></div>
                <div><label className="text-xs text-gray-500 font-medium">Strength</label><select className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.strength||"Warm"} onChange={e=>setForm(p=>({...p,strength:e.target.value}))}>{STRENGTHS.map(s=><option key={s}>{s}</option>)}</select></div>
              </div>
              <div><label className="text-xs text-gray-500 font-medium">Follow-up Date</label><input type="date" className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.followUp||""} onChange={e=>setForm(p=>({...p,followUp:e.target.value}))}/></div>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="text-xs text-gray-500 font-medium">Birthday</label><input type="date" className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.birthday||""} onChange={e=>setForm(p=>({...p,birthday:e.target.value}))}/></div>
                <div><label className="text-xs text-gray-500 font-medium">Work Anniversary</label><input type="date" className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.workAnniversary||""} onChange={e=>setForm(p=>({...p,workAnniversary:e.target.value}))}/></div>
              </div>
              <div><label className="text-xs text-gray-500 font-medium">Tags (comma separated)</label><input className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.tags||""} onChange={e=>setForm(p=>({...p,tags:e.target.value}))} placeholder="AppSec, CISO, ZeroTrust"/></div>
            </div>
            <div className="flex gap-2 mt-5">
              <button onClick={saveContact} className="flex-1 bg-slate-800 text-white py-3 rounded-xl text-sm font-semibold">Save</button>
              <button onClick={()=>setModal(null)} className="flex-1 border border-gray-200 py-3 rounded-xl text-sm text-gray-600">Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Schedule ──────────────────────────────────────────────────
function Schedule({posts,setPosts}){
  const [copied,setCopied]=useState(null);
  const sorted=[...posts].sort((a,b)=>a.date>b.date?1:-1);
  const weeks={};
  sorted.forEach(p=>{
    const d=new Date(p.date);const mon=new Date(d);
    mon.setDate(d.getDate()-d.getDay()+1);
    const key=mon.toISOString().split("T")[0];
    if(!weeks[key])weeks[key]=[];weeks[key].push(p);
  });
  function handlePost(p){
    const text=`${p.title}\n\n${p.body}\n\n#ApplicationSecurity #CyberSecurity #AppSec`;
    navigator.clipboard&&navigator.clipboard.writeText(text).then(()=>{
      setCopied(p.id);setTimeout(()=>setCopied(null),3000);
      setTimeout(()=>window.open("https://www.linkedin.com/feed/","_blank"),500);
    });
  }
  function markPublished(p){const u=posts.map(x=>x.id===p.id?{...x,status:"Published"}:x);setPosts(u);store("posts",u);}
  function deletePost(id){const u=posts.filter(x=>x.id!==id);setPosts(u);store("posts",u);}
  return(
    <div className="space-y-4 pb-6">
      <div className="bg-slate-900 rounded-xl p-4 text-white">
        <div className="font-bold text-lg">Publishing Schedule</div>
        <div className="text-xs text-slate-400 mt-1">AppSec Thought Leadership — Tuesday and Friday</div>
        <div className="flex gap-4 mt-2 text-sm text-slate-300">
          <span>{posts.filter(p=>p.status==="Published").length} published</span>
          <span>{posts.filter(p=>p.status==="Scheduled").length} scheduled</span>
          <span>{posts.filter(p=>p.status==="Draft").length} drafts</span>
        </div>
      </div>
      {Object.keys(weeks).sort().map(w=>(
        <div key={w} className="bg-white border border-gray-200 rounded-xl overflow-hidden">
          <div className="bg-gray-50 px-4 py-2.5 border-b flex justify-between items-center">
            <span className="font-semibold text-sm">Week of {w}</span>
            <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${weeks[w].length>=2?"bg-green-100 text-green-700":"bg-amber-100 text-amber-700"}`}>{weeks[w].length}/2 posts</span>
          </div>
          {weeks[w].map(p=>(
            <div key={p.id} className="px-4 py-3 border-b last:border-0">
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1">
                  <div className="font-medium text-sm leading-snug">{p.title}</div>
                  <div className="flex gap-2 mt-1">
                    <span className="text-xs text-gray-400">{p.date}</span>
                    {p.source&&<Badge text={p.source} color={sourceColor(p.source)}/>}
                  </div>
                </div>
                <Badge text={p.status} color={statusColor(p.status)}/>
              </div>
              {(p.status==="Scheduled"||p.status==="Draft")&&(
                <div className="flex gap-2 mt-3">
                  <button onClick={()=>handlePost(p)} className={`flex-1 text-xs py-2.5 rounded-xl font-semibold ${copied===p.id?"bg-green-600 text-white":"bg-slate-800 text-white"}`}>
                    {copied===p.id?"Copied — LinkedIn opening":"Copy and Open LinkedIn"}
                  </button>
                  {p.status==="Scheduled"&&<button onClick={()=>markPublished(p)} className="text-xs border border-green-300 text-green-600 px-3 py-2 rounded-xl">Done</button>}
                </div>
              )}
              <button onClick={()=>deletePost(p.id)} className="text-xs text-gray-300 mt-2">Remove</button>
            </div>
          ))}
        </div>
      ))}
      {Object.keys(weeks).length===0&&<div className="text-center py-12 text-gray-400 text-sm">No posts yet. Fetch topics and save a draft to get started.</div>}
    </div>
  );
}

// ── Events ────────────────────────────────────────────────────
function Events({contacts}){
  const [wishModal,setWishModal]=useState(null);
  const [wishText,setWishText]=useState("");
  const [copied,setCopied]=useState(false);
  const all=[];
  contacts.forEach(c=>{
    if(c.birthday){const d=getDaysUntil(c.birthday.slice(5));all.push({...c,type:"Birthday",emoji:"🎂",days:d});}
    if(c.workAnniversary){const d=getDaysUntil(c.workAnniversary.slice(5));all.push({...c,type:"Work Anniversary",emoji:"🏆",days:d});}
  });
  all.sort((a,b)=>a.days-b.days);
  const tpl={
    Birthday:c=>`Happy Birthday, ${c.name}. Wishing you a great day and an even better year ahead. Your work in ${c.role||"the field"} continues to be an inspiration.`,
    "Work Anniversary":c=>`Congratulations on your work anniversary, ${c.name}. Your contributions as ${c.role||"a professional"} at ${c.company||"your organisation"} speak for themselves. Well deserved.`,
  };
  function openWish(c,t){setWishModal({c,t});setWishText(tpl[t]?.(c)||"");setCopied(false);}
  function copyAndOpen(){
    navigator.clipboard&&navigator.clipboard.writeText(wishText).then(()=>{
      setCopied(true);
      setTimeout(()=>window.open(`https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(wishModal.c.name)}`,"_blank"),400);
    });
  }
  const sections=[
    {title:"Today",events:all.filter(e=>e.days===0),urgent:true},
    {title:"This Week",events:all.filter(e=>e.days>0&&e.days<=7)},
    {title:"This Month",events:all.filter(e=>e.days>7&&e.days<=30)},
  ];
  return(
    <div className="space-y-5 pb-6">
      <div className="bg-slate-900 rounded-xl p-4 text-white">
        <div className="font-bold text-lg">Birthdays and Anniversaries</div>
        <div className="flex gap-4 mt-2 text-sm text-slate-300">
          <span>Today: {all.filter(e=>e.days===0).length}</span>
          <span>Week: {all.filter(e=>e.days<=7).length}</span>
          <span>Month: {all.filter(e=>e.days<=30).length}</span>
        </div>
      </div>
      {all.length===0&&<div className="text-center py-12 text-gray-400 text-sm">Add birthdays and work anniversaries in the Contacts tab to see them here.</div>}
      {sections.map(sec=>sec.events.length>0&&(
        <div key={sec.title}>
          <div className={`font-semibold text-sm mb-2 ${sec.urgent?"text-rose-600":"text-gray-600"}`}>{sec.title}</div>
          <div className="space-y-2">
            {sec.events.map((e,i)=>(
              <div key={i} className={`bg-white border rounded-xl p-4 flex items-center justify-between ${sec.urgent?"border-rose-200":""}`}>
                <div>
                  <div className="font-semibold text-gray-800">{e.name}</div>
                  <div className="text-xs text-gray-500">{e.role} — {e.company}</div>
                  <div className="text-xs text-gray-400 mt-0.5">{e.type}{e.days===0?" — today":` — in ${e.days} days`}</div>
                </div>
                <button onClick={()=>openWish(e,e.type)} className="bg-slate-800 text-white text-xs px-3 py-2 rounded-xl">Write wish</button>
              </div>
            ))}
          </div>
        </div>
      ))}
      {wishModal&&(
        <div className="fixed inset-0 bg-black/50 flex items-end z-50">
          <div className="bg-white rounded-t-2xl p-5 w-full">
            <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"/>
            <div className="font-bold text-lg mb-1">{wishModal.t}</div>
            <div className="text-sm text-gray-500 mb-3">For {wishModal.c.name}</div>
            <textarea className="w-full border border-gray-200 rounded-xl p-3 text-sm h-32 resize-none bg-gray-50 leading-relaxed" value={wishText} onChange={e=>setWishText(e.target.value)}/>
            <div className="flex gap-2 mt-4">
              <button onClick={copyAndOpen} className={`flex-1 py-3 rounded-xl text-sm font-semibold ${copied?"bg-green-600 text-white":"bg-slate-800 text-white"}`}>
                {copied?"Copied — finding on LinkedIn":"Copy and find on LinkedIn"}
              </button>
              <button onClick={()=>setWishModal(null)} className="border border-gray-200 px-4 py-3 rounded-xl text-sm text-gray-600">Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

        {tab==="Home"&&<Home contacts={contacts} posts={posts} setTab={setTab} showBixby={()=>setShowBixby(true)}/>}
        {tab==="Topics"&&<Topics posts={posts} setPosts={setPosts}/>}
        {tab==="Contacts"&&<Contacts contacts={contacts} setContacts={setContacts}/>}
        {tab==="Schedule"&&<Schedule posts={posts} setPosts={setPosts}/>}
        {tab==="Events"&&<Events contacts={contacts}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
