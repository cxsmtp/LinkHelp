<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const APP_URL="https://cxsmtp.github.io/LinkHelp/";
const TABS=["Dashboard","Auto-Blog","Contacts","Schedule","Celebrations"];
const STRENGTHS=["Strong","Warm","Cold"];
const INDUSTRIES=["Tech","Cybersecurity","Sales","Fintech","Healthcare","SaaS","Other"];
const STATUSES=["Draft","Scheduled","Published"];
const RSS_PROXIES=[
  url=>`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`,
  url=>`https://rssproxy.migor.org/api/rss?url=${encodeURIComponent(url)}&out=json`,
];
const CHECKMARX_RSS="https://checkmarx.com/feed/";

const sampleContacts=[
  {id:1,name:"Priya Sharma",role:"CISO",company:"CloudShield",industry:"Cybersecurity",strength:"Strong",followUp:"2026-03-18",birthday:"1988-07-15",workAnniversary:"2020-03-01",notes:"Met at Black Hat 2025",tags:["AppSec","CISO"]},
  {id:2,name:"Marcus Lee",role:"Sales Engineer",company:"Palo Alto Networks",industry:"Cybersecurity",strength:"Warm",followUp:"2026-03-22",birthday:"1990-03-20",workAnniversary:"2022-06-10",notes:"Interested in AppSec trends",tags:["AppSec","SE"]},
  {id:3,name:"Ananya Iyer",role:"AppSec Lead",company:"FinEdge",industry:"Fintech",strength:"Strong",followUp:"2026-03-25",birthday:"1985-12-05",workAnniversary:"2019-03-12",notes:"Collaboration on AI threat modeling",tags:["AppSec","AI"]},
];
const samplePosts=[
  {id:1,title:"How AI is Redefining Application Security in 2026",body:"AI is no longer just a tool for attackers...",status:"Published",date:"2026-03-05",topic:"AI & Application Security"},
  {id:2,title:"Zero Trust in the Age of AI-Powered Threats",body:"The perimeter is dead. Here's what's replacing it...",status:"Scheduled",date:"2026-03-14",topic:"AI & Application Security"},
];

function ls(k,v){try{if(v!==undefined)localStorage.setItem(k,JSON.stringify(v));else{const x=localStorage.getItem(k);return x?JSON.parse(x):null;}}catch(e){return null;}}
function getDaysUntil(mmdd){
  const t=new Date(),t0=new Date(t.getFullYear(),t.getMonth(),t.getDate());
  const[m,d]=mmdd.split("-").map(Number);
  let n=new Date(t.getFullYear(),m-1,d);
  if(n<t0)n.setFullYear(t.getFullYear()+1);
  return Math.round((n-t0)/86400000);
}
function getUpcomingCelebrations(contacts){
  const ev=[];
  contacts.forEach(c=>{
    if(c.birthday){const d=getDaysUntil(c.birthday.slice(5));if(d<=30)ev.push({...c,type:"Birthday",emoji:"🎂",days:d});}
    if(c.workAnniversary){const d=getDaysUntil(c.workAnniversary.slice(5));if(d<=30)ev.push({...c,type:"Work Anniversary",emoji:"🏆",days:d});}
  });
  return ev.sort((a,b)=>a.days-b.days);
}

async function fetchCheckmarxPosts(){
  for(const mk of RSS_PROXIES){
    try{
      const r=await fetch(mk(CHECKMARX_RSS),{signal:AbortSignal.timeout(8000)});
      const d=await r.json();
      if(d.items?.length>0)return d.items.slice(0,5).map(i=>({
        title:i.title,
        link:i.link||i.url,
        summary:(i.description||i.content||"").replace(/<[^>]*>/g,"").slice(0,500),
        date:i.pubDate||i.published||"",
      }));
    }catch(e){continue;}
  }
  throw new Error("Could not fetch Checkmarx blog.");
}

// ── The master ChatGPT prompt ─────────────────────────────────
function buildPrompt(article){
  return `You are a world-class AppSec thought leader writing a LinkedIn post to establish authority in Application Security and AI-driven threats.

━━━━━━━━━━━━━━━━━━━━━━━━
SOURCE ARTICLE (Checkmarx):
Title: "${article.title}"
Summary: "${article.summary}"
Link: ${article.link}
━━━━━━━━━━━━━━━━━━━━━━━━

YOUR TASK — produce ALL of the following in one response:

1. 📝 LINKEDIN POST
   - Start with a powerful hook (first line must stop the scroll)
   - 3-4 paragraphs, under 600 words
   - Add my personal perspective as an AppSec professional
   - Reference the Checkmarx insight naturally
   - Also search Medium, OWASP, DarkReading, Krebs on Security, and DEV.to for any related recent articles to enrich the post
   - Use relevant emojis throughout
   - End with 5-7 hashtags: #AppSec #ApplicationSecurity #CyberSecurity #AIThreats #DevSecOps #ZeroTrust #InfoSec

2. 💬 THOUGHT LEADERSHIP QUOTE
   - One powerful original quote (2-3 sentences) I can use as a pull-quote or carousel slide
   - Format: "Quote text here." — [My Name], AppSec Professional

3. 🖼️ IMAGE GENERATION PROMPT
   - Write a detailed DALL-E / ChatGPT image prompt to generate a professional visual for this post
   - Style: modern, dark tech aesthetic, no text in image, suitable for LinkedIn
   - Example format: "A cinematic digital artwork of [description]..."

━━━━━━━━━━━━━━━━━━━━━━━━
IMPORTANT:
- This is purely AppSec thought leadership — no sales, no product pitches
- Write as a practitioner who lives and breathes application security
- Make it feel authentic, not like marketing copy
━━━━━━━━━━━━━━━━━━━━━━━━`;
}

function Badge({text,color="blue"}){
  const c={blue:"bg-blue-100 text-blue-700",green:"bg-green-100 text-green-700",yellow:"bg-yellow-100 text-yellow-800",red:"bg-red-100 text-red-700",purple:"bg-purple-100 text-purple-700",gray:"bg-gray-100 text-gray-600",orange:"bg-orange-100 text-orange-700",pink:"bg-pink-100 text-pink-700",indigo:"bg-indigo-100 text-indigo-700",teal:"bg-teal-100 text-teal-700"};
  return <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${c[color]||c.blue}`}>{text}</span>;
}
function statusColor(s){return s==="Published"?"green":s==="Scheduled"?"blue":"gray";}

// ── Bixby Guide ───────────────────────────────────────────────

    {n:2,icon:"➕",title:"Create New Routine",desc:'Tap "+" → name it "LinkedIn Auto Blog"'},

          <div className="flex justify-between items-center">
            <div><div className="font-bold text-lg">⚡ Bixby Setup</div><div className="text-xs text-gray-400">Auto-trigger every Tue & Fri 9AM</div></div>
            <button onClick={onClose} className="text-gray-400 text-2xl">×</button>
          </div>
        </div>
        <div className="p-5 space-y-4">
          <div className="bg-violet-50 border border-violet-200 rounded-xl p-4 text-sm text-violet-800">
            <strong>Full auto flow:</strong> Bixby → App fetches Checkmarx Zero → Builds AppSec thought leadership prompt → Opens ChatGPT with post + quote + image prompt ready 🚀
          </div>
          {steps.map(s=>(
            <div key={s.n} className="flex gap-3 bg-gray-50 rounded-xl p-4">
              <div className="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-sm shrink-0">{s.n}</div>
              <div><div className="font-semibold text-sm">{s.icon} {s.title}</div><div className="text-xs text-gray-500 mt-1 whitespace-pre-wrap">{s.desc}</div></div>
            </div>

          <div className="bg-green-50 border border-green-200 rounded-xl p-4">
            <div className="font-semibold text-green-800 text-sm mb-2">📋 Bixby Trigger URL (tap to copy)</div>
            <div className="text-xs font-mono break-all bg-white rounded-lg p-2 border border-green-200 text-green-700"
              onClick={()=>{navigator.clipboard?.writeText(triggerUrl);alert("✅ Copied!");}}>
              {triggerUrl}
            </div>
          </div>
          <button onClick={onClose} className="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold">Got it! ✅</button>
        </div>
      </div>
    </div>
  );
}

// ── AUTO BLOG TAB ─────────────────────────────────────────────
function AutoBlog({posts,setPosts}){
  const [status,setStatus]=useState("idle");
  const [articles,setArticles]=useState([]);
  const [selected,setSelected]=useState(null);
  const [prompt,setPrompt]=useState("");
  const [copied,setCopied]=useState(false);
  const [showPrompt,setShowPrompt]=useState(false);

  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    if(p.get("action")==="autoblog")fetchArticles();
  },[]);

  async function fetchArticles(){
    setStatus("fetching");setArticles([]);setSelected(null);setPrompt("");setCopied(false);
    try{
      const items=await fetchCheckmarxPosts();
      setArticles(items);
      setSelected(items[0]);
      setPrompt(buildPrompt(items[0]));
      setStatus("ready");
    }catch(e){setStatus("error");}
  }

  function selectArticle(a){
    setSelected(a);
    setPrompt(buildPrompt(a));
    setCopied(false);
  }

  function handleOpenChatGPT(){
    navigator.clipboard?.writeText(prompt).then(()=>{
      setCopied(true);
      setTimeout(()=>{
        window.location.href="chatgpt://";
        setTimeout(()=>window.open("https://chat.openai.com/","_blank"),1500);
      },300);
    }).catch(()=>window.open("https://chat.openai.com/","_blank"));
  }

  function saveAsDraft(){
    if(!selected)return;
    const post={id:Date.now(),title:selected.title,body:prompt,status:"Draft",date:new Date().toISOString().split("T")[0],topic:"AI & Application Security"};
    const u=[...posts,post];setPosts(u);ls("posts",u);
    alert("✅ Saved as draft!");
  }

  return(
    <div className="space-y-4 pb-6">
      {/* Header */}
      <div className="bg-gradient-to-br from-slate-900 to-blue-900 rounded-xl p-5 text-white">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-2xl">🔐</span>
          <div>
            <div className="font-bold text-lg">AppSec Thought Leadership</div>
            <div className="text-xs text-blue-300">Powered by Checkmarx Zero · ChatGPT</div>
          </div>
        </div>
        <div className="text-xs text-blue-200 mt-2 leading-relaxed">Fetches the latest Checkmarx blog → builds a full LinkedIn post + quote + image prompt → opens ChatGPT</div>
        <div className="flex flex-wrap gap-2 mt-3">
          <Badge text="🔐 AppSec" color="indigo"/>
          <Badge text="📰 Checkmarx Zero" color="blue"/>
          <Badge text="🤖 ChatGPT" color="teal"/>
          <Badge text="🖼️ Image Prompt" color="purple"/>
        </div>
      </div>

      {/* What you get */}
      <div className="bg-white border rounded-xl p-4">
        <div className="font-semibold text-sm text-gray-700 mb-3">📦 What ChatGPT will generate:</div>
        <div className="space-y-2">
          {[
            {icon:"📝",title:"LinkedIn Post",desc:"600 words, hook opener, AppSec insight, enriched with Medium + OWASP + DarkReading sources"},
            {icon:"💬",title:"Thought Leadership Quote",desc:"A powerful pull-quote you can use as a carousel slide or story"},
            {icon:"🖼️",title:"Image Generation Prompt",desc:"A detailed DALL-E prompt to generate a professional visual for your post"},
          ].map(item=>(
            <div key={item.icon} className="flex gap-3 bg-gray-50 rounded-xl p-3">
              <span className="text-xl shrink-0">{item.icon}</span>
              <div><div className="font-semibold text-sm text-gray-800">{item.title}</div><div className="text-xs text-gray-500 mt-0.5">{item.desc}</div></div>
            </div>
          ))}
        </div>
      </div>

      {/* Fetch button */}
      {status==="idle"&&(
        <button onClick={fetchArticles} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-xl font-bold text-base shadow-md active:opacity-90">
          🔄 Fetch Latest Checkmarx Zero Post
        </button>
      )}

      {/* Fetching */}
      {status==="fetching"&&(
        <div className="bg-white border rounded-xl p-10 text-center">
          <div className="text-3xl spin mb-3">🌐</div>
          <div className="font-semibold text-gray-700">Fetching from Checkmarx Zero...</div>
          <div className="text-xs text-gray-400 mt-1">Reading latest AppSec articles</div>
        </div>
      )}

      {/* Error */}
      {status==="error"&&(
        <div className="bg-red-50 border border-red-200 rounded-xl p-5 text-center">
          <div className="text-3xl mb-2">❌</div>
          <div className="font-semibold text-red-700">Could not fetch Checkmarx blog</div>
          <div className="text-xs text-red-400 mt-1 mb-4">Check your internet connection and try again</div>
          <button onClick={fetchArticles} className="bg-red-500 text-white px-6 py-2 rounded-xl text-sm font-medium">Try Again</button>
        </div>
      )}

      {/* Articles */}
      {status==="ready"&&(
        <>
          <div className="font-semibold text-sm text-gray-700">📰 Latest from Checkmarx Zero — select one:</div>
          <div className="space-y-2">
            {articles.map((a,i)=>(
              <button key={i} onClick={()=>selectArticle(a)}
                className={`w-full text-left border rounded-xl p-3 transition ${selected?.title===a.title?"border-blue-500 bg-blue-50":"bg-white border-gray-200"}`}>
                <div className="flex items-start gap-2">
                  <span className="text-lg shrink-0">{selected?.title===a.title?"✅":"📄"}</span>
                  <div>
                    <div className="font-medium text-sm text-gray-800">{a.title}</div>
                    {a.date&&<div className="text-xs text-gray-400 mt-0.5">{new Date(a.date).toLocaleDateString()}</div>}
                    {a.summary&&<div className="text-xs text-gray-500 mt-1 line-clamp-2">{a.summary}</div>}
                  </div>
                </div>
              </button>
            ))}
          </div>

          {/* Prompt preview */}
          {selected&&(
            <div className="bg-white border rounded-xl overflow-hidden">
              <button onClick={()=>setShowPrompt(p=>!p)} className="w-full flex justify-between items-center px-4 py-3 text-sm font-semibold text-gray-700">
                <span>📋 Full ChatGPT Prompt Preview</span>
                <span className="text-gray-400 text-xs">{showPrompt?"▲ hide":"▼ show"}</span>
              </button>
              {showPrompt&&(
                <div className="px-4 pb-4">
                  <textarea className="w-full border rounded-xl p-3 text-xs h-52 resize-none bg-gray-50 text-gray-600" value={prompt} onChange={e=>setPrompt(e.target.value)}/>
                  <div className="text-xs text-gray-400 mt-1">✏️ You can edit this before sending to ChatGPT</div>
                </div>
              )}
            </div>
          )}

          {/* CTA */}
          <div className="space-y-3">
            <button onClick={handleOpenChatGPT}
              className={`w-full py-4 rounded-xl font-bold text-base shadow-md transition ${copied?"bg-green-500 text-white":"bg-[#10a37f] text-white"}`}>
              {copied?"✅ Prompt Copied! Opening ChatGPT...":"🤖 Copy Full Prompt & Open ChatGPT"}
            </button>

            <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-800 space-y-1">
              <div className="font-semibold">📌 In ChatGPT — do this:</div>
              <div>1. Paste the prompt → hit Send</div>
              <div>2. Copy the LinkedIn post → paste on LinkedIn</div>
              <div>3. Copy the image prompt → tap the 🖼️ image icon in ChatGPT → generate</div>
              <div>4. Download image → attach to your LinkedIn post</div>
              <div>5. Use the quote as your first comment or carousel</div>
            </div>

            <div className="flex gap-2">
              <button onClick={saveAsDraft} className="flex-1 border border-blue-300 text-blue-600 py-2.5 rounded-xl text-sm font-medium">💾 Save Draft</button>
              <button onClick={()=>{setStatus("idle");setArticles([]);setCopied(false);}} className="flex-1 border text-gray-500 py-2.5 rounded-xl text-sm font-medium">🔄 Refresh</button>
            </div>
          </div>
        </>
      )}

      {/* Bixby reminder */}
      <div className="bg-violet-50 border border-violet-200 rounded-xl p-4">
        <div className="font-semibold text-violet-800 text-sm">⚡ Bixby Auto-Trigger</div>
        <div className="text-xs text-violet-600 mt-1">Bixby opens this tab automatically every Tue & Fri at 9AM using this URL:</div>
        <div className="text-xs font-mono text-violet-700 mt-1 break-all">{APP_URL}?action=autoblog</div>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────

          <div>
            <div className="font-bold text-lg">🔐 AppSec Auto Blog</div>

          <div><div className="font-bold">⚡ Bixby — Tue & Fri 9AM</div><div className="text-xs text-purple-200 mt-0.5">Fully automated trigger</div></div>

            <div className="text-2xl font-bold text-gray-800">{card.value}</div>
            <div className="text-xs text-gray-500">{card.label}</div>
          </button>

      {week7.length>0&&<div className="bg-white border rounded-xl p-4"><h3 className="font-semibold text-gray-700 mb-3">🔔 This Week</h3>{week7.map((e,i)=><div key={i} className="flex items-center justify-between py-2 border-b last:border-0"><div><div className="font-medium text-sm">{e.name}</div><div className="text-xs text-gray-400">{e.role}</div></div><div className="flex gap-1 items-center"><span>{e.emoji}</span><Badge text={`${e.days}d`} color="pink"/></div></div>)}</div>}

      <div className="bg-white border rounded-xl p-4">
        <h3 className="font-semibold text-gray-700 mb-3">💼 Connection Strength</h3>
        {STRENGTHS.map(s=>{const count=contacts.filter(c=>c.strength===s).length;const pct=contacts.length?Math.round(count/contacts.length*100):0;return(<div key={s} className="mb-2"><div className="flex justify-between text-xs text-gray-600 mb-1"><span>{s}</span><span>{count}</span></div><div className="h-2 bg-gray-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${s==="Strong"?"bg-green-500":s==="Warm"?"bg-yellow-400":"bg-gray-300"}`} style={{width:`${pct}%`}}/></div></div>);})}
      </div>
    </div>
  );
}

// ── Contacts (with CSV Import) ────────────────────────────────
function Contacts({contacts,setContacts}){
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [activeStr,setActiveStr]=useState("All");
  const [importing,setImporting]=useState(false);
  const fileRef=useRef();

  const filtered=contacts.filter(c=>(activeStr==="All"||c.strength===activeStr)&&(c.name.toLowerCase().includes(search.toLowerCase())||c.company.toLowerCase().includes(search.toLowerCase())));
  const grouped={Strong:filtered.filter(c=>c.strength==="Strong"),Warm:filtered.filter(c=>c.strength==="Warm"),Cold:filtered.filter(c=>c.strength==="Cold")};

  function openAdd(){setForm({name:"",role:"",company:"",industry:"Tech",strength:"Warm",followUp:"",birthday:"",workAnniversary:"",notes:"",tags:""});setModal("add");}
  function openEdit(c){setForm({...c,tags:c.tags.join(", ")});setModal("edit");}
  function saveContact(){
    const contact={...form,tags:form.tags?form.tags.split(",").map(t=>t.trim()).filter(Boolean):[]};
    let u=modal==="add"?[...contacts,{...contact,id:Date.now()}]:contacts.map(c=>c.id===form.id?contact:c);
    setContacts(u);ls("contacts",u);setModal(null);
  }
  function del(id){const u=contacts.filter(c=>c.id!==id);setContacts(u);ls("contacts",u);}

  // LinkedIn CSV Import
  function handleCSV(e){
    const file=e.target.files[0];
    if(!file)return;
    setImporting(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const text=ev.target.result;
        const lines=text.split("\n").filter(l=>l.trim());
        if(lines.length<2){alert("CSV appears empty.");setImporting(false);return;}
        // Parse header — LinkedIn CSV headers vary slightly
        const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim().toLowerCase());
        const firstIdx=headers.findIndex(h=>h.includes("first"));
        const lastIdx=headers.findIndex(h=>h.includes("last"));
        const companyIdx=headers.findIndex(h=>h.includes("company"));
        const positionIdx=headers.findIndex(h=>h.includes("position")||h.includes("title")||h.includes("role"));
        const emailIdx=headers.findIndex(h=>h.includes("email"));

        const imported=[];
        for(let i=1;i<lines.length;i++){
          // Handle quoted CSV fields
          const cols=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g)||lines[i].split(",");
          const clean=cols.map(c=>c.replace(/^"|"$/g,"").trim());
          const firstName=firstIdx>=0?clean[firstIdx]||"":"";
          const lastName=lastIdx>=0?clean[lastIdx]||"":"";
          const name=`${firstName} ${lastName}`.trim();
          if(!name)continue;
          const company=companyIdx>=0?clean[companyIdx]||"":"";
          const role=positionIdx>=0?clean[positionIdx]||"":"";
          // Skip duplicates by name
          if(contacts.find(c=>c.name.toLowerCase()===name.toLowerCase()))continue;
          imported.push({
            id:Date.now()+i,
            name,role,company,
            industry:"Tech",
            strength:"Warm",
            followUp:"",birthday:"",workAnniversary:"",
            notes:`Imported from LinkedIn`,
            tags:["LinkedIn"],
          });
        }
        if(imported.length===0){alert("No new contacts found in CSV (duplicates skipped).");setImporting(false);return;}
        const u=[...contacts,...imported];
        setContacts(u);ls("contacts",u);
        alert(`✅ Imported ${imported.length} contacts from LinkedIn!`);
      }catch(err){alert("Could not parse CSV. Make sure it's LinkedIn's Connections.csv file.");}
      setImporting(false);
      fileRef.current.value="";
    };
    reader.readAsText(file);
  }

  return(
    <div className="space-y-4 pb-6">
      {/* LinkedIn CSV Import Banner */}
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
        <div className="font-semibold text-blue-800 text-sm mb-1">📥 Import LinkedIn Contacts</div>
        <div className="text-xs text-blue-600 mb-3">Export from LinkedIn → Settings → Data Privacy → Get a copy of your data → Connections → Download CSV</div>
        <input ref={fileRef} type="file" accept=".csv" className="hidden" onChange={handleCSV}/>
        <button onClick={()=>fileRef.current.click()} disabled={importing}
          className="w-full bg-blue-600 text-white py-2.5 rounded-xl text-sm font-semibold disabled:opacity-50 active:bg-blue-700">
          {importing?"⏳ Importing...":"📂 Import Connections.csv"}
        </button>
      </div>

      <div className="flex gap-2">
        <input className="border rounded-xl px-3 py-2.5 text-sm flex-1 bg-white" placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <button onClick={openAdd} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-medium">+ Add</button>
      </div>

      <div className="flex gap-2 overflow-x-auto pb-1">
        {["All",...STRENGTHS].map(s=><button key={s} onClick={()=>setActiveStr(s)} className={`px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap ${activeStr===s?"bg-blue-600 text-white":"bg-white border text-gray-600"}`}>{s}{s!=="All"?` (${contacts.filter(c=>c.strength===s).length})`:""}</button>)}
      </div>
      <div className="text-xs text-gray-400">{contacts.length} total contacts</div>

      {(activeStr==="All"?STRENGTHS:[activeStr]).map(str=>grouped[str]?.length>0&&(
        <div key={str}>
          <div className="text-sm font-bold text-gray-600 mb-2">{str==="Strong"?"💚":str==="Warm"?"🟡":"⚪"} {str} ({grouped[str].length})</div>
          <div className="space-y-3">{grouped[str].map(c=>{
            const cel=[];
            if(c.birthday){const d=getDaysUntil(c.birthday.slice(5));if(d<=30)cel.push(`🎂 ${d}d`);}
            if(c.workAnniversary){const d=getDaysUntil(c.workAnniversary.slice(5));if(d<=30)cel.push(`🏆 ${d}d`);}
            return(<div key={c.id} className={`bg-white border rounded-xl p-4 ${cel.length?"border-pink-200":""}`}>
              <div className="flex justify-between items-start"><div><div className="font-semibold">{c.name}</div><div className="text-xs text-gray-400">{c.role}{c.role&&c.company?" · ":""}{c.company}</div></div><Badge text={c.industry} color="indigo"/></div>
              {cel.map((x,i)=><span key={i} className="text-xs text-pink-500 font-medium mr-2">{x}</span>)}
              {c.notes&&<p className="text-xs text-gray-400 mt-1 italic">"{c.notes}"</p>}
              <div className="flex flex-wrap gap-1 mt-2">{c.tags.map(t=><Badge key={t} text={t} color="gray"/>)}</div>
              <div className="flex justify-between items-center mt-2">
                {c.followUp&&<span className="text-xs text-orange-500">📅 {c.followUp}</span>}
                <div className="ml-auto flex gap-4"><button onClick={()=>openEdit(c)} className="text-xs text-blue-600">Edit</button><button onClick={()=>del(c.id)} className="text-xs text-red-400">Delete</button></div>
              </div>
            </div>);
          })}</div>
        </div>
      ))}

      {modal&&(<div className="fixed inset-0 bg-black/50 flex items-end z-50" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div className="bg-white rounded-t-2xl p-5 w-full max-h-[90vh] overflow-y-auto">
          <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"/>
          <h2 className="font-bold text-lg mb-4">{modal==="add"?"➕ Add":"✏️ Edit"} Contact</h2>
          <div className="space-y-3">
            {[["name","Name"],["role","Role / Title"],["company","Company"],["notes","Notes"]].map(([k,l])=>(
              <div key={k}><label className="text-xs text-gray-500 font-medium">{l}</label><input className="w-full border rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form[k]||""} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/></div>
            ))}
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs text-gray-500 font-medium">Industry</label><select className="w-full border rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.industry||"Tech"} onChange={e=>setForm(p=>({...p,industry:e.target.value}))}>{INDUSTRIES.map(i=><option key={i}>{i}</option>)}</select></div>
              <div><label className="text-xs text-gray-500 font-medium">Strength</label><select className="w-full border rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.strength||"Warm"} onChange={e=>setForm(p=>({...p,strength:e.target.value}))}>{STRENGTHS.map(s=><option key={s}>{s}</option>)}</select></div>
            </div>
            <div><label className="text-xs text-gray-500 font-medium">Follow-up</label><input type="date" className="w-full border rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.followUp||""} onChange={e=>setForm(p=>({...p,followUp:e.target.value}))}/></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs text-gray-500 font-medium">🎂 Birthday</label><input type="date" className="w-full border rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.birthday||""} onChange={e=>setForm(p=>({...p,birthday:e.target.value}))}/></div>
              <div><label className="text-xs text-gray-500 font-medium">🏆 Anniversary</label><input type="date" className="w-full border rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.workAnniversary||""} onChange={e=>setForm(p=>({...p,workAnniversary:e.target.value}))}/></div>
            </div>
            <div><label className="text-xs text-gray-500 font-medium">Tags</label><input className="w-full border rounded-xl px-3 py-2.5 text-sm mt-0.5 bg-gray-50" value={form.tags||""} onChange={e=>setForm(p=>({...p,tags:e.target.value}))} placeholder="AppSec, AI, CISO"/></div>
          </div>
          <div className="flex gap-2 mt-5"><button onClick={saveContact} className="flex-1 bg-blue-600 text-white py-3 rounded-xl text-sm font-semibold">Save</button><button onClick={()=>setModal(null)} className="flex-1 border py-3 rounded-xl text-sm text-gray-600">Cancel</button></div>
        </div>
      </div>)}
    </div>
  );
}

// ── Schedule ──────────────────────────────────────────────────
function Schedule({posts,setPosts}){
  const [copied,setCopied]=useState(null);
  const sorted=[...posts].sort((a,b)=>a.date>b.date?1:-1);
  const weeks={};
  sorted.forEach(p=>{const d=new Date(p.date);const mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1);const key=mon.toISOString().split("T")[0];if(!weeks[key])weeks[key]=[];weeks[key].push(p);});
  function handleCopyOpen(p){
    const text=`${p.title}\n\n${p.body}\n\n#AppSec #ApplicationSecurity #CyberSecurity #AIThreats #DevSecOps`;
    navigator.clipboard?.writeText(text).then(()=>{setCopied(p.id);setTimeout(()=>setCopied(null),3000);setTimeout(()=>window.open("https://www.linkedin.com/feed/","_blank"),500);});
  }
  function markPublished(p){const u=posts.map(x=>x.id===p.id?{...x,status:"Published"}:x);setPosts(u);ls("posts",u);}
  return(
    <div className="space-y-4 pb-6">
      <div className="bg-gradient-to-r from-slate-800 to-indigo-900 rounded-xl p-4 text-white">
        <div className="font-bold text-lg">📆 Schedule</div>
        <div className="text-xs text-blue-200 mt-1">🔐 AppSec Thought Leadership · Tue & Fri · 2/week</div>
        <div className="flex gap-4 mt-2 text-sm"><span>✅ {posts.filter(p=>p.status==="Published").length} published</span><span>🕐 {posts.filter(p=>p.status==="Scheduled").length} scheduled</span></div>
      </div>
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-800"><strong>💡 To post:</strong> Tap "Copy & Open LinkedIn" → paste → Post!</div>
      {Object.keys(weeks).sort().map(w=>(
        <div key={w} className="bg-white border rounded-xl overflow-hidden">
          <div className="bg-gray-50 px-4 py-2.5 border-b flex justify-between items-center"><span className="font-semibold text-sm">Week of {w}</span><span className={`text-xs font-medium px-2 py-0.5 rounded-full ${weeks[w].length>=2?"bg-green-100 text-green-700":"bg-yellow-100 text-yellow-700"}`}>{weeks[w].length}/2</span></div>
          {weeks[w].map(p=>(
            <div key={p.id} className="px-4 py-3 border-b last:border-0">
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1"><div className="font-medium text-sm">{p.title}</div><div className="text-xs text-gray-400 mt-0.5">{p.date}</div></div>
                <Badge text={p.status} color={statusColor(p.status)}/>
              </div>
              {(p.status==="Scheduled"||p.status==="Draft")&&(
                <div className="flex gap-2 mt-3">
                  <button onClick={()=>handleCopyOpen(p)} className={`flex-1 text-xs py-2 rounded-xl font-semibold ${copied===p.id?"bg-green-500 text-white":"bg-blue-600 text-white"}`}>{copied===p.id?"✅ Copied!":"📋 Copy & Open LinkedIn"}</button>
                  {p.status==="Scheduled"&&<button onClick={()=>markPublished(p)} className="text-xs border border-green-300 text-green-600 px-3 py-2 rounded-xl">✅ Done</button>}
                </div>
              )}
            </div>
          ))}
        </div>
      ))}
      {Object.keys(weeks).length===0&&<p className="text-gray-400 text-sm text-center py-10">No posts yet. Use Auto-Blog to generate one!</p>}
    </div>
  );
}

// ── Celebrations ──────────────────────────────────────────────
function Celebrations({contacts}){
  const [wishModal,setWishModal]=useState(null);
  const [wishText,setWishText]=useState("");
  const [copied,setCopied]=useState(false);
  const all=[];
  contacts.forEach(c=>{
    if(c.birthday){const d=getDaysUntil(c.birthday.slice(5));all.push({...c,type:"Birthday",emoji:"🎂",days:d});}
    if(c.workAnniversary){const d=getDaysUntil(c.workAnniversary.slice(5));all.push({...c,type:"Work Anniversary",emoji:"🏆",days:d});}
  });
  all.sort((a,b)=>a.days-b.days);
  const templates={Birthday:c=>`🎂 Happy Birthday, ${c.name}! Wishing you a wonderful day. Your expertise in ${c.role||"your field"} at ${c.company||"your company"} is truly inspiring. Here's to an incredible year ahead! 🚀`,
    "Work Anniversary":c=>`🏆 Congratulations on your work anniversary, ${c.name}! Your dedication as ${c.role||"a professional"} at ${c.company||"your company"} is truly valued. Wishing you continued success! 💼`};
  function openWish(contact,type){setWishModal({contact,type});setWishText(templates[type]?.(contact)||"");setCopied(false);}
  function copyAndOpen(){navigator.clipboard?.writeText(wishText).then(()=>{setCopied(true);setTimeout(()=>window.open(`https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(wishModal.contact.name)}`,"_blank"),400);});}
  const sections=[{title:"🎉 TODAY",events:all.filter(e=>e.days===0),hi:true},{title:"📅 This Week",events:all.filter(e=>e.days>0&&e.days<=7)},{title:"🗓️ This Month",events:all.filter(e=>e.days>7&&e.days<=30)}];
  return(
    <div className="space-y-5 pb-6">
      <div className="bg-gradient-to-r from-pink-500 to-rose-500 rounded-xl p-4 text-white">
        <div className="font-bold text-lg">🎉 Celebrations</div>
        <div className="flex gap-4 mt-2 text-sm"><span>Today: <strong>{all.filter(e=>e.days===0).length}</strong></span><span>Week: <strong>{all.filter(e=>e.days>0&&e.days<=7).length}</strong></span><span>Month: <strong>{all.filter(e=>e.days<=30).length}</strong></span></div>
      </div>
      {all.length===0&&<p className="text-gray-400 text-sm text-center py-10">Import contacts or add birthdays & anniversaries to see them here!</p>}
      {sections.map(sec=>sec.events.length>0&&(
        <div key={sec.title}>
          <div className={`font-semibold text-sm mb-2 ${sec.hi?"text-pink-600":"text-gray-600"}`}>{sec.title}</div>
          <div className="space-y-2">{sec.events.map((e,i)=>(
            <div key={i} className={`bg-white border rounded-xl p-4 flex items-center justify-between ${sec.hi?"border-pink-200 bg-pink-50":""}`}>
              <div><div className="font-semibold">{e.emoji} {e.name}</div><div className="text-xs text-gray-500">{e.role} · {e.company}</div><div className="text-xs text-gray-400 mt-0.5">{e.type}{e.days===0?" — Today! 🎉":` — in ${e.days}d`}</div></div>
              <button onClick={()=>openWish(e,e.type)} className="bg-pink-500 text-white text-xs px-3 py-2 rounded-xl">✍️ Wish</button>
            </div>
          ))}</div>
        </div>
      ))}
      {wishModal&&(
        <div className="fixed inset-0 bg-black/50 flex items-end z-50">
          <div className="bg-white rounded-t-2xl p-5 w-full">
            <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"/>
            <h2 className="font-bold text-lg mb-1">{wishModal.type} Wish</h2>
            <p className="text-sm text-gray-500 mb-3">For <strong>{wishModal.contact.name}</strong></p>
            <textarea className="w-full border rounded-xl p-3 text-sm h-32 resize-none bg-gray-50" value={wishText} onChange={e=>setWishText(e.target.value)}/>
            <div className="flex gap-2 mt-4">
              <button onClick={copyAndOpen} className={`flex-1 py-3 rounded-xl text-sm font-semibold ${copied?"bg-green-500 text-white":"bg-pink-500 text-white"}`}>{copied?"✅ Copied! Opening LinkedIn...":"📋 Copy & Find on LinkedIn"}</button>
              <button onClick={()=>setWishModal(null)} className="border px-4 py-3 rounded-xl text-sm text-gray-600">✕</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState(()=>{
    const p=new URLSearchParams(window.location.search);
    if(p.get("action")==="autoblog")return "Auto-Blog";
    return p.get("tab")||"Dashboard";
  });
  const [contacts,setContacts]=useState(()=>ls("contacts")||sampleContacts);
  const [posts,setPosts]=useState(()=>ls("posts")||samplePosts);
  const [showBixby,setShowBixby]=useState(false);

  useEffect(()=>{if("Notification" in window&&Notification.permission==="default")Notification.requestPermission();},[]);

  const icons={Dashboard:"🏠","Auto-Blog":"🔐",Contacts:"👥",Schedule:"📅",Celebrations:"🎉"};
  const todayCel=getUpcomingCelebrations(contacts).filter(e=>e.days===0).length;

  return(
    <div className="min-h-screen bg-gray-50 flex flex-col">
      {showBixby&&<BixbyGuide onClose={()=>setShowBixby(false)}/>}
      <div className="bg-white border-b sticky top-0 z-40 safe-top">
        <div className="px-4 pt-3 pb-2">
          <div className="flex items-center gap-2 mb-2">
            <div className="w-8 h-8 bg-gradient-to-br from-slate-800 to-blue-700 rounded-xl flex items-center justify-center text-white font-bold text-xs">🔐</div>
            <div><div className="font-bold text-gray-800 text-sm">LinkedIn Pro Manager</div><div className="text-xs text-gray-400">AppSec Thought Leadership · Checkmarx Zero</div></div>
          </div>
          <div className="flex gap-1">
            {TABS.map(t=>(
              <button key={t} onClick={()=>setTab(t)} className={`flex-1 py-2 rounded-lg text-xs font-medium relative transition-colors ${tab===t?"bg-blue-600 text-white":"text-gray-500"}`}>
                {icons[t]}
                {t==="Celebrations"&&todayCel>0&&<span className="absolute -top-1 -right-0.5 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">{todayCel}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto px-4 pt-4 safe-bottom">
        {tab==="Dashboard"&&<Dashboard contacts={contacts} posts={posts} setTab={setTab} showBixby={()=>setShowBixby(true)}/>}
        {tab==="Auto-Blog"&&<AutoBlog posts={posts} setPosts={setPosts}/>}
        {tab==="Contacts"&&<Contacts contacts={contacts} setContacts={setContacts}/>}
        {tab==="Schedule"&&<Schedule posts={posts} setPosts={setPosts}/>}
        {tab==="Celebrations"&&<Celebrations contacts={contacts}/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
</body>
